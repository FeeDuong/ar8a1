<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RATING HỌC SINH 8A1</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="
bg-black
text-gray-100
font-sans
min-h-screen
p-4
md:p-8
overflow-x-hidden
relative
">
<div
  class="
    fixed
    inset-0
    -z-10
    overflow-hidden
  "
>

  <div
    class="
      absolute
      top-[-200px]
      left-[-200px]
      w-[500px]
      h-[500px]
      bg-pink-500/20
      blur-3xl
      rounded-full
      animate-pulse
    "
  ></div>

  <div
    class="
      absolute
      bottom-[-200px]
      right-[-200px]
      w-[500px]
      h-[500px]
      bg-cyan-500/20
      blur-3xl
      rounded-full
      animate-pulse
    "
  ></div>

</div>
<header class="mb-8 text-center">
  <div
  id="statsOverview"
  class="
    grid
    grid-cols-2
    md:grid-cols-4
    gap-4
  "
></div>

  <h1
  class="
    text-5xl
    md:text-7xl
    font-black
    text-transparent
    bg-clip-text
    bg-gradient-to-r
    from-pink-500
    via-purple-500
    to-cyan-400
    tracking-widest
    drop-shadow-[0_0_25px_rgba(236,72,153,0.6)]
    animate-pulse
  "
>
  FORUM HỌC SINH 8A1
</h1>

  <p class="text-gray-500 mt-2 text-sm">
    Hệ thống đánh giá & góp ý công khai
  </p>

  <div class="mt-4 space-y-1">

    <p class="text-sm font-bold bg-gradient-to-r from-cyan-400 to-blue-500 text-transparent bg-clip-text">
      Code by Linuxxer
    </p>

    <p class="text-xs text-gray-600">
      Idea by PNTrungKien
    </p>

  </div>

</header>
  <div class="max-w-6xl mx-auto">

   <h1
  class="
    text-5xl
    md:text-7xl
    font-black
    text-transparent
    bg-clip-text
    bg-gradient-to-r
    from-pink-500
    via-purple-500
    to-cyan-400
    tracking-widest
    drop-shadow-[0_0_25px_rgba(236,72,153,0.6)]
    animate-pulse
  "
>
  FORUM HỌC SINH 8A1
</h1>

    <p class="text-center text-gray-500 mb-8">
      Hệ thống góp ý & đánh giá lớp học
    </p>

    <div class="grid md:grid-cols-3 gap-6">

      <!-- FORM -->
      <div class="bg-white/5
backdrop-blur-xl border border-gray-800 rounded-2xl p-5 space-y-4">

        <h2 class="text-xl font-bold text-pink-400">
          Gửi đánh giá
        </h2>

        <!-- STUDENT -->
        <div>
          <label class="text-sm text-gray-400">
            Chọn học sinh
          </label>

          <select
            id="studentSelect"
            class="w-full mt-1 bg-gray-800 border border-gray-700 rounded-xl p-3"
          >
            <option value="">
              -- Chọn học sinh --
            </option>
          </select>
        </div>

        <!-- TOPIC -->
        <div>
          <label class="text-sm text-gray-400">
            Chủ đề
          </label>

          <select
            id="topicSelect"
            class="w-full mt-1 bg-gray-800 border border-gray-700 rounded-xl p-3"
          >
            <option value="hoc_tap">
              Học tập
            </option>

            <option value="noi_quy">
              Nề nếp
            </option>

            <option value="hoat_dong">
              Hoạt động lớp
            </option>

            <option value="giao_tiep">
              Giao tiếp
            </option>

            <option value="khac">
              Khác
            </option>
          </select>
        </div>

        <!-- STARS -->
        <div>

          <div class="flex justify-between items-center mb-2">
            <span class="text-sm text-gray-400">
              Chấm điểm
            </span>

            <span
              id="ratingDisplay"
              class="font-bold text-yellow-400"
            >
              0/10★
            </span>
          </div>

          <div class="flex flex-wrap gap-1 text-3xl">

            <span class="star cursor-pointer" data-value="1">★</span>
            <span class="star cursor-pointer" data-value="2">★</span>
            <span class="star cursor-pointer" data-value="3">★</span>
            <span class="star cursor-pointer" data-value="4">★</span>
            <span class="star cursor-pointer" data-value="5">★</span>
            <span class="star cursor-pointer" data-value="6">★</span>
            <span class="star cursor-pointer" data-value="7">★</span>
            <span class="star cursor-pointer" data-value="8">★</span>
            <span class="star cursor-pointer" data-value="9">★</span>
            <span class="star cursor-pointer" data-value="10">★</span>

          </div>
        </div>

        <!-- IDENTITY -->
        <div class="space-y-2">

          <div class="text-sm text-gray-400">
            Danh tính
          </div>

          <div class="flex gap-4">

            <label class="flex items-center gap-2 cursor-pointer">
              <input
                type="radio"
                name="identityMode"
                value="anonymous"
                checked
              />

              <span>Ẩn danh</span>
            </label>

            <label class="flex items-center gap-2 cursor-pointer">
              <input
                type="radio"
                name="identityMode"
                value="public"
              />

              <span>Hiện tên</span>
            </label>

          </div>

          <div
            id="nameInputWrapper"
            class="hidden"
          >
            <input
              type="text"
              id="senderName"
              placeholder="Tên của bạn..."
              class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3"
            />
          </div>

        </div>

        <!-- COMMENT -->
        <div>
          <label class="text-sm text-gray-400">
            Nội dung
          </label>

          <textarea
            id="reviewComment"
            rows="5"
            placeholder="Nhập góp ý..."
            class="w-full mt-1 bg-gray-800 border border-gray-700 rounded-xl p-3 resize-none"
          ></textarea>
        </div>

        <!-- BUTTON -->
        <button
          id="submitBtn"
          class="w-full bg-gradient-to-r from-pink-500 to-orange-500 hover:opacity-90 transition rounded-xl py-3 font-bold"
        >
          Gửi đánh giá
        </button>

      </div>

      <!-- RIGHT -->
      <div class="md:col-span-2 space-y-6">

        <!-- STATS -->
        <div class="bg-white/5
backdrop-blur-xl900 border border-gray-800 rounded-2xl p-5">

          <h2 class="text-xl font-bold text-yellow-400 mb-4">
            Bảng xếp hạng
          </h2>

          <div
            id="statsContainer"
            class="grid md:grid-cols-2 gap-3"
          ></div>

        </div>

        <!-- REVIEWS -->
        <div>

          <h2 class="text-xl font-bold text-pink-400 mb-4">
            Bình luận công khai
          </h2>

          <div
  class="bg-white/5
backdrop-blur-xl border border-gray-800 rounded-3xl p-5 shadow-xl"
>

  <h2
    class="text-2xl font-black mb-4 bg-gradient-to-r from-yellow-300 to-orange-500 text-transparent bg-clip-text"
  >
    🏆 TOP HỌC SINH HOT NHẤT
  </h2>

  <div
    id="topStudentsContainer"
    class="space-y-3"
  ></div>

</div>
          <div
            id="reviewsContainer"
            class="space-y-3"
          ></div>

        </div>

      </div>

    </div>

  </div>

  
<script src="app.js"></script>
</body>
</html>
