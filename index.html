<!DOCTYPE html>
<html lang="vi">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    FORUM HỌC SINH 8A1
  </title>

  <link
    rel="icon"
    type="image/png"
    href="Screenshot 2026-05-22 at 20-41-17 (1)Tập đoàn A1🐉 (@k49a1_dragon) TikTok.png"
  />

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body
class="
  bg-black
  text-white
  min-h-screen
  overflow-x-hidden
  font-sans
"
>

<!-- BACKGROUND -->
<div
class="
  fixed
  inset-0
  pointer-events-none
  overflow-hidden
  -z-10
"
>

  <div class="absolute top-10 left-20 text-pink-500 animate-bounce">
    ✦
  </div>

  <div class="absolute top-40 right-32 text-cyan-400 animate-pulse">
    ✦
  </div>

  <div class="absolute bottom-20 left-1/3 text-purple-400 animate-ping">
    ✦
  </div>

</div>
<div
class="
  fixed
  inset-0
  -z-10
  overflow-hidden
"
>

  <div
  class="
    absolute
    w-[500px]
    h-[500px]
    bg-pink-500/20
    blur-3xl
    rounded-full
    top-[-200px]
    left-[-200px]
    animate-pulse
  "
  ></div>

  <div
  class="
    absolute
    w-[500px]
    h-[500px]
    bg-cyan-500/20
    blur-3xl
    rounded-full
    bottom-[-200px]
    right-[-200px]
    animate-pulse
  "
  ></div>

</div>

<div
class="
  max-w-7xl
  mx-auto
  p-4
  md:p-8
"
>

  <!-- HEADER -->

  <header class="text-center mb-10">

    <h1
    class="
      text-5xl
      md:text-7xl
      font-black
      bg-gradient-to-r
      from-pink-500
      via-purple-500
      to-cyan-400
      text-transparent
      bg-clip-text
      tracking-widest
      animate-pulse
    "
    >
      FORUM HỌC SINH 8A1
    </h1>

    <p
    class="
      text-gray-400
      mt-3
      tracking-[0.3em]
      uppercase
      text-xs
    "
    >
      Anonymous Student Network
    </p>

    <div class="mt-4">

      <p
      class="
        text-sm
        font-bold
        bg-gradient-to-r
        from-cyan-400
        to-purple-400
        text-transparent
        bg-clip-text
      "
      >
        Code by Linuxxer
      </p>

      <p
      class="
        text-xs
        text-gray-500
      "
      >
        Idea by PNTrungKien
      </p>

    </div>

  </header>

  <!-- OVERVIEW -->

  <div
    id="statsOverview"
    class="
      grid
      grid-cols-2
      md:grid-cols-4
      gap-4
      mb-8
    "
  ></div>

  <!-- MAIN -->

  <div
  class="
    grid
    md:grid-cols-3
    gap-6
  "
  >

    <!-- LEFT -->

    <div
    class="
      bg-white/5
      backdrop-blur-xl
      border
      border-white/10
      rounded-3xl
      p-5
      h-fit
      shadow-xl
    "
    >

      <h2
      class="
        text-2xl
        font-black
        mb-5
        text-pink-400
      "
      >
        ✨ Gửi đánh giá
      </h2>

      <!-- SEARCH -->

      <input
        type="text"
        id="searchInput"
        placeholder="Tìm học sinh..."
        class="
          w-full
          bg-gray-900
          border
          border-gray-700
          rounded-2xl
          p-3
          mb-4
          outline-none
          focus:border-pink-500
        "
      />

      <!-- SELECT -->

      <select
        id="studentSelect"
        class="
          w-full
          bg-gray-900
          border
          border-gray-700
          rounded-2xl
          p-3
          mb-4
        "
      >

        <option value="">
          -- Chọn học sinh --
        </option>

      </select>

      <!-- TOPIC -->

      <select
        id="topicSelect"
        class="
          w-full
          bg-gray-900
          border
          border-gray-700
          rounded-2xl
          p-3
          mb-4
        "
      >

        <option value="hoc_tap">
          Học tập
        </option>

        <option value="noi_quy">
          Nề nếp
        </option>

        <option value="hoat_dong">
          Hoạt động lớp
        </option>

        <option value="giao_tiep">
          Giao tiếp
        </option>

        <option value="khac">
          Khác
        </option>

      </select>

      <!-- STARS -->

      <div class="mb-5">

        <div
        class="
          flex
          justify-between
          mb-2
        "
        >

          <span class="text-gray-400">
            Chấm điểm
          </span>

          <span
            id="ratingDisplay"
            class="
              font-black
              text-yellow-400
            "
          >
            0/10★
          </span>

        </div>

        <div
          class="
            flex
            flex-wrap
            gap-1
            text-3xl
          "
        >

          <span class="star cursor-pointer" data-value="1">★</span>
          <span class="star cursor-pointer" data-value="2">★</span>
          <span class="star cursor-pointer" data-value="3">★</span>
          <span class="star cursor-pointer" data-value="4">★</span>
          <span class="star cursor-pointer" data-value="5">★</span>
          <span class="star cursor-pointer" data-value="6">★</span>
          <span class="star cursor-pointer" data-value="7">★</span>
          <span class="star cursor-pointer" data-value="8">★</span>
          <span class="star cursor-pointer" data-value="9">★</span>
          <span class="star cursor-pointer" data-value="10">★</span>

        </div>

      </div>

      <!-- IDENTITY -->

      <div class="mb-4">

        <div class="flex gap-4 mb-3">

          <label class="flex items-center gap-2">

            <input
              type="radio"
              name="identityMode"
              value="anonymous"
              checked
            />

            <span>
              Ẩn danh
            </span>

          </label>

          <label class="flex items-center gap-2">

            <input
              type="radio"
              name="identityMode"
              value="public"
            />

            <span>
              Hiện tên
            </span>

          </label>

        </div>

        <div
          id="nameInputWrapper"
          class="hidden"
        >

          <input
            type="text"
            id="senderName"
            placeholder="Tên của bạn..."
            class="
              w-full
              bg-gray-900
              border
              border-gray-700
              rounded-2xl
              p-3
            "
          />

        </div>

      </div>

      <!-- COMMENT -->

      <textarea
        id="reviewComment"
        rows="5"
        placeholder="Nhập góp ý..."
        class="
          w-full
          bg-gray-900
          border
          border-gray-700
          rounded-2xl
          p-3
          resize-none
          mb-4
        "
      ></textarea>

      <!-- BUTTON -->

      <button
        id="submitBtn"
        class="
          w-full
          bg-gradient-to-r
          from-pink-500
via-purple-500
to-cyan-500
          rounded-2xl
          py-3
          font-black
          hover:scale-105
          transition-all duration-300 hover:scale-[1.02] hover:-translate-y-1 hover:shadow-2xl hover:shadow-pink-500/20
        "
      >
        🚀 Gửi đánh giá
      </button>

    </div>

    <!-- RIGHT -->

    <div class="md:col-span-2 space-y-6">

      <!-- TOP -->

      <div
      class="
        bg-white/5
        backdrop-blur-xl
        border
        border-white/10
        rounded-3xl
        p-5
      "
      >

        <h2
        class="
          text-2xl
          font-black
          mb-5
          bg-gradient-to-r
          from-yellow-300
          to-orange-500
          text-transparent
          bg-clip-text
        "
        >
          🏆 TOP HỌC SINH HOT
        </h2>

        <div
          id="topStudentsContainer"
          class="space-y-3"
        ></div>

      </div>

      <!-- REVIEWS -->

      <div>

        <h2
        class="
          text-2xl
          font-black
          mb-5
          text-pink-400
        "
        >
          💬 Bình luận công khai
        </h2>

        <div
          id="reviewsContainer"
          animate-[fadeIn_0.4s_ease]
hover:shadow-[0_0_30px_rgba(236,72,153,0.7)]
          class="space-y-4"
        ></div>

      </div>

    </div>

  </div>

</div>
<button
  id="adminLoginBtn"
  class="
    fixed
    bottom-5
    right-5
    bg-red-500/80
    hover:bg-red-500
    px-4
    py-2
    rounded-2xl
    font-black
    shadow-lg
    transition-all
  "
>
  ADMIN
</button>
<style>

@keyframes fadeIn {

  from {

    opacity: 0;
    transform:
    translateY(20px);
  }

  to {

    opacity: 1;
    transform:
    translateY(0);
  }
}

</style>
<script src="app.js"></script>

</body>
</html>
